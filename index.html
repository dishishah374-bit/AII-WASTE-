<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Waste Classifier</title>

<!-- Fonts -->
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #020617, #0f172a, #020617);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
}

/* Main Container */
.app {
    width: 95%;
    max-width: 900px;
    padding: 20px;
}

/* Glass Card */
.card {
    background: rgba(255,255,255,0.05);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 40px rgba(0,0,0,0.5);
    margin-bottom: 20px;
}

/* Header */
.header {
    text-align: center;
    margin-bottom: 20px;
}

.header h1 {
    font-weight: 600;
    font-size: 28px;
    background: linear-gradient(90deg, #38bdf8, #22c55e);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

.header p {
    color: #94a3b8;
    margin-top: 8px;
}

/* Button */
button {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: 12px;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    background: linear-gradient(135deg, #38bdf8, #0ea5e9);
    color: white;
    transition: 0.3s;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 20px rgba(56,189,248,0.4);
}

/* Webcam */
#webcam-container {
    display: flex;
    justify-content: center;
}

canvas {
    border-radius: 16px;
    box-shadow: 0 0 25px rgba(0,0,0,0.6);
}

/* Result Section */
.result-box {
    text-align: center;
}

#result {
    font-size: 26px;
    font-weight: 600;
    margin-bottom: 10px;
}

#confidence {
    color: #94a3b8;
    margin-bottom: 15px;
}

/* Bin Info */
.bin {
    padding: 15px;
    border-radius: 12px;
    font-size: 18px;
    font-weight: 500;
}

/* Colors */
.blue {
    background: linear-gradient(135deg, #1e3a8a, #3b82f6);
}

.green {
    background: linear-gradient(135deg, #14532d, #22c55e);
}

.red {
    background: linear-gradient(135deg, #7f1d1d, #ef4444);
}

/* Status */
#status {
    text-align: center;
    margin-top: 10px;
    color: #38bdf8;
    font-size: 14px;
}

/* Footer */
.footer {
    text-align: center;
    font-size: 13px;
    color: #64748b;
    margin-top: 10px;
}
</style>
</head>

<body>

<div class="app">

    <!-- Header -->
    <div class="header">
        <h1>♻️ AI Waste Classifier</h1>
        <p>Smart segregation using AI</p>
    </div>

    <!-- Start Button -->
    <div class="card">
        <button id="startBtn" onclick="init()">🚀 Start Camera</button>
        <div id="status">Click start to begin</div>
    </div>

    <!-- Camera -->
    <div class="card">
        <div id="webcam-container"></div>
    </div>

    <!-- Result -->
    <div class="card result-box">
        <div id="result">Waiting...</div>
        <div id="confidence"></div>
        <div id="bin-info"></div>
    </div>

    <div class="footer">
        Built with AI • Clean Earth Initiative 🌍
    </div>

</div>

</body>
</html>
