<!DOCTYPE html>
<html>
<head>
    <title>AI Classifier</title>

    <!-- ✅ FIXED SCRIPTS -->
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>
</head>

<body style="background:#0f172a;color:white;text-align:center;font-family:Arial;">

<h1>AI Image Classifier</h1>
<p id="status">Click Start</p>

<button onclick="init()">Start Camera</button>

<div id="webcam-container"></div>
<div id="label-container"></div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/B5B6A_T667/";

let model, webcam, labelContainer;

async function init() {
    try {
        document.getElementById("status").innerText = "Loading model...";

        model = await tmImage.load(URL + "model.json", URL + "metadata.json");

        webcam = new tmImage.Webcam(300, 300, true);
        await webcam.setup();
        await webcam.play();

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        labelContainer = document.getElementById("label-container");
        labelContainer.innerHTML = "";

        for (let i = 0; i < model.getTotalClasses(); i++) {
            labelContainer.appendChild(document.createElement("div"));
        }

        document.getElementById("status").innerText = "Running...";
        window.requestAnimationFrame(loop);

    } catch (e) {
        document.getElementById("status").innerText = "❌ " + e.message;
        console.error(e);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const prediction = await model.predict(webcam.canvas);

    for (let i = 0; i < prediction.length; i++) {
        labelContainer.childNodes[i].innerHTML =
            prediction[i].className + ": " +
            (prediction[i].probability * 100).toFixed(1) + "%";
    }
}
</script>

</body>
</html>
