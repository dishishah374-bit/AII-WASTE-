<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<title>AI Waste Classifier</title>

<!-- TensorFlow + Teachable Machine -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

canvas {
    border-radius: 10px;
    margin-top: 10px;
}

#result {
    font-size: 24px;
    margin-top: 15px;
    font-weight: bold;
}

.bin {
    margin-top: 15px;
    font-size: 18px;
    padding: 12px;
    border-radius: 8px;
}

.blue { background: #1e3a8a; }
.green { background: #14532d; }
.red { background: #7f1d1d; }

#status {
    margin-top: 10px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>♻️ AI Waste Classifier</h1>
<p id="status">Click Start</p>

<button onclick="init()">Start Camera</button>

<div class="card">
    <div id="webcam-container"></div>
</div>

<div class="card">
    <div id="result">Prediction: -</div>
    <div id="bin-info" class="bin"></div>
</div>

</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/B5B6A_T667/";

let model, webcam;

// Waste mapping
const wasteBins = {
    "PLASTIC": { bin: "Blue Bin (Recyclable)", class: "blue" },
    "PAPER": { bin: "Blue Bin (Recyclable)", class: "blue" },
    "FOOD": { bin: "Green Bin (Wet Waste)", class: "green" },
    "BATTERY": { bin: "Red Bin (Hazardous Waste)", class: "red" }
};

async function init() {
    try {
        document.getElementById("status").innerText = "Loading model...";

        const modelURL = URL + "model.json";
        const metadataURL = URL + "metadata.json";

        model = await tmImage.load(modelURL, metadataURL);

        webcam = new tmImage.Webcam(320, 320, true);
        await webcam.setup();
        await webcam.play();

        const container = document.getElementById("webcam-container");
        container.innerHTML = "";
        container.appendChild(webcam.canvas);

        document.getElementById("status").innerText = "Running...";
        window.requestAnimationFrame(loop);

    } catch (err) {
        document.getElementById("status").innerText = "Error: " + err.message;
        console.error(err);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const predictions = await model.predict(webcam.canvas);

    // highest probability class
    let top = predictions.reduce((a, b) =>
        a.probability > b.probability ? a : b
    );

    const label = top.className.toUpperCase();
    const confidence = (top.probability * 100).toFixed(1);

    document.getElementById("result").innerHTML =
        `${label} <br> ${confidence}% confidence`;

    const binDiv = document.getElementById("bin-info");

    if (wasteBins[label]) {
        binDiv.className = "bin " + wasteBins[label].class;
        binDiv.innerText = "Put in: " + wasteBins[label].bin;
    } else {
        binDiv.className = "bin";
        binDiv.innerText = "No bin info available";
    }
}
</script>

</body>
</html>
