<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>AI Waste Classifier</title>

<!-- Libraries -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@4.10.0/dist/tf.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@0.8.5/dist/teachablemachine-image.min.js"></script>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg, #0f172a, #020617);
    color: white;
    text-align: center;
}

.container {
    max-width: 800px;
    margin: auto;
    padding: 20px;
}

h1 {
    margin-top: 20px;
}

.card {
    background: #1e293b;
    padding: 20px;
    border-radius: 12px;
    margin-top: 20px;
}

button {
    padding: 12px 25px;
    font-size: 16px;
    background: #38bdf8;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

button:hover {
    background: #0ea5e9;
}

canvas {
    border-radius: 10px;
    margin-top: 10px;
}

#result {
    font-size: 26px;
    margin-top: 15px;
    font-weight: bold;
}

.bin {
    margin-top: 15px;
    font-size: 20px;
    padding: 12px;
    border-radius: 8px;
}

/* Bin colors */
.blue { background: #1e3a8a; }
.green { background: #14532d; }
.red { background: #7f1d1d; }

#status {
    margin-top: 10px;
    color: #38bdf8;
}
</style>
</head>

<body>

<div class="container">

<h1>♻️ AI Waste Classifier</h1>
<p id="status">Click Start</p>

<button onclick="init()">Start Camera</button>

<div class="card">
    <div id="webcam-container"></div>
</div>

<div class="card">
    <div id="result">Prediction: -</div>
    <div id="bin-info"></div>
</div>

</div>

<script>
const URL = "https://teachablemachine.withgoogle.com/models/B5B6A_T667/";

let model, webcam;

// ✅ ONLY YOUR 4 CLASSES
const wasteBins = {
    "PLASTIC": { bin: "Blue Bin (Recyclable)", class: "blue" },
    "PAPER": { bin: "Blue Bin (Recyclable)", class: "blue" },
    "FOOD": { bin: "Green Bin (Wet Waste)", class: "green" },
    "BATTERY": { bin: "Red Bin (Hazardous Waste)", class: "red" }
};

async function init() {
    try {
        document.getElementById("status").innerText = "Loading model...";

        model = await tmImage.load(URL + "model.json", URL + "metadata.json");

        webcam = new tmImage.Webcam(320, 320, true);
        await webcam.setup();
        await webcam.play();

        document.getElementById("webcam-container").innerHTML = "";
        document.getElementById("webcam-container").appendChild(webcam.canvas);

        document.getElementById("status").innerText = "Running...";
        window.requestAnimationFrame(loop);

    } catch (e) {
        document.getElementById("status").innerText = "Error: " + e.message;
        console.error(e);
    }
}

async function loop() {
    webcam.update();
    await predict();
    window.requestAnimationFrame(loop);
}

async function predict() {
    const predictions = await model.predict(webcam.canvas);

    // Get highest prediction
    let top = predictions.reduce((a, b) =>
        a.probability > b.probability ? a : b
    );

    // Show result
    document.getElementById("result").innerHTML =
        `${top.className}<br>${(top.probability * 100).toFixed(1)}% confidence`;

    // Match bin (auto uppercase fix)
    const binData = wasteBins[top.className.toUpperCase()];
    const binDiv = document.getElementById("bin-info");

    if (binData) {
        binDiv.className = "bin " + binData.class;
        binDiv.innerText = "Put in: " + binData.bin;
    } else {
        binDiv.className = "bin";
        binDiv.innerText = "No bin info available";
    }
}
</script>

</body>
</html>
